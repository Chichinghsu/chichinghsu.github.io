<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="description" content="{% if page.description %}{{ page.description | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:title" content="{{ page.title }} | {{ site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:image" content="{{ page.thumbnail | absolute_url }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:type" content="article">
    <title>
        {% if site.category_names[page.title] %}
          {{ site.category_names[page.title] }} |
        {% else %}
          {{ page.title }}
        {% endif %}
        疏離蘇黎世
    </title>
    <link rel="icon" href="https://fav.farm/%E2%9C%8F%EF%B8%8F">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% if jekyll.environment == "production" %}
      {% include analytics.html %}
    {% endif %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">疏離蘇黎世</a>

            <button class="menu-toggle" aria-label="Open Menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <ul class="nav-links">
                <li><a href="{{ '/category/eth' | relative_url }}">碩博生活</a></li>
                <li><a href="{{ '/category/flights' | relative_url }}">飛行紀錄</a></li>
                <li><a href="{{ '/category/books' | relative_url }}">閱讀筆記</a></li>
                <li><a href="{{ '/category/travel' | relative_url }}">遊記</a></li>
                <li><a href="{{ '/category/switzerland' | relative_url }}">瑞士</a></li>
                <li><a href="{{ '/category/arch' | relative_url }}">建築</a></li>
                <li><a href="{{ '/category/data' | relative_url }}">數據</a></li>
                <li><a href="{{ '/category/others' | relative_url }}">隨筆</a></li>
                <li><a href="{{ '/archive/' | relative_url }}">全部文章</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {{ content }}
    </main>

    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-about">
                <h3><a href="/">CCH 的疏離蘇黎世</a></h3>
            </div>
            
            <div class="footer-social">
                <a href="{{ '/about' | relative_url }}">我是誰？</a>
            </div>

        </div>
    </footer>
<script>
    const menuToggle = document.querySelector('.menu-toggle');
    const navLinks = document.querySelector('.nav-links');

    menuToggle.addEventListener('click', (e) => {
        e.stopPropagation(); // Prevents the click from bubbling up
        navLinks.classList.toggle('active');
        menuToggle.classList.toggle('is-active');
    });

    // Close menu if clicking anywhere else on the screen
    document.addEventListener('click', (e) => {
        if (!menuToggle.contains(e.target) && !navLinks.contains(e.target)) {
            navLinks.classList.remove('active');
            menuToggle.classList.remove('is-active');
        }
    });
</script>
</body>
</html>
